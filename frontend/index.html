<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Serverless Feedback Collector</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; max-width: 500px; margin: 50px auto; line-height: 1.6; }
        .box { border: 1px solid #ddd; padding: 20px; border-radius: 8px; box-shadow: 2px 2px 10px #eee; }
        input, textarea { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;}
        button { background: #232f3e; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; width: 100%; }
        button:hover { background: #37475a; }
        #status { margin-top: 10px; color: green; font-weight: bold; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Submit Feedback</h2>
        <input type="text" id="name" placeholder="Your Name">
        <textarea id="message" rows="4" placeholder="How can we improve?"></textarea>
        <button onclick="sendFeedback()">Submit Feedback</button>
        <p id="status"></p>
    </div>

    <script>
        const API_ENDPOINT = "https://dphkf5s57d.execute-api.ap-southeast-2.amazonaws.com";

        async function sendFeedback() {
            const name = document.getElementById('name').value;
            const message = document.getElementById('message').value;
            const status = document.getElementById('status');

            try {
                const response = await fetch(`${API_ENDPOINT}/feedback`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, message })
                });

                if (response.ok) {
                    status.innerText = "🚀 Feedback Sent!";
                    document.getElementById('name').value = '';
                    document.getElementById('message').value = '';
                }
            } catch (err) {
                status.innerText = "❌ Error sending feedback.";
                console.error(err);
            }
        }
    </script>
</body>
</html>
